<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 210" width="780" height="210">
  <style>
    .mono { font-family: ui-monospace,Menlo,monospace; font-size: 11px; fill: #FEFDF9; }
    .mono-dim { font-family: ui-monospace,Menlo,monospace; font-size: 11px; fill: rgba(254,253,249,0.35); }
    .label { font-family: system-ui,-apple-system,sans-serif; font-size: 12px; fill: #FEFDF9; }
    .label-blue { font-family: system-ui,-apple-system,sans-serif; font-size: 11px; fill: #5db5ff; }
    .label-dim { font-family: system-ui,-apple-system,sans-serif; font-size: 11px; fill: rgba(254,253,249,0.35); }
    .heading { font-family: system-ui,-apple-system,sans-serif; font-size: 13px; font-weight: 700; fill: #FEFDF9; }
  </style>

  <!-- FILE CARD: left side -->
  <!-- Outer border -->
  <rect x="50" y="10" width="240" height="185" rx="8" fill="rgba(7,98,200,0.08)" stroke="#0762C8" stroke-width="1.5"/>

  <!-- Header bar -->
  <rect x="50" y="10" width="240" height="30" rx="8" fill="#0762C8"/>
  <rect x="50" y="28" width="240" height="12" fill="#0762C8"/>
  <text x="170" y="30" text-anchor="middle" class="heading">SKILL.md</text>

  <!-- Frontmatter section (always in context) -->
  <rect x="50" y="40" width="240" height="78" fill="rgba(93,181,255,0.13)"/>
  <line x1="50" y1="118" x2="290" y2="118" stroke="rgba(93,181,255,0.3)" stroke-width="1"/>
  <text x="65" y="60" class="mono">name: my-skill</text>
  <text x="65" y="78" class="mono">description: ...</text>
  <text x="65" y="96" class="mono">trigger: ...</text>
  <text x="65" y="112" class="label-blue">↑ always in context</text>

  <!-- Body section (greyed out) -->
  <text x="65" y="138" class="mono-dim">## Instructions</text>
  <text x="65" y="155" class="mono-dim">Step 1: ...</text>
  <text x="65" y="171" class="mono-dim">Step 2: ...</text>
  <text x="170" y="188" text-anchor="middle" class="label-dim">body</text>

  <!-- Arrow -->
  <line x1="300" y1="105" x2="348" y2="105" stroke="#5db5ff" stroke-width="1.5"/>
  <polygon points="348,100 358,105 348,110" fill="#5db5ff"/>

  <!-- RIGHT SIDE: two boxes -->

  <!-- Box 1: context window (lit) -->
  <rect x="370" y="15" width="230" height="80" rx="8" fill="rgba(93,181,255,0.1)" stroke="#5db5ff" stroke-width="1.5"/>
  <text x="485" y="44" text-anchor="middle" class="label-blue">context window</text>
  <text x="485" y="64" text-anchor="middle" class="heading">description only</text>
  <text x="485" y="84" text-anchor="middle" class="label-blue">↑ loaded on every request</text>

  <!-- Box 2: body (dim, dashed) -->
  <rect x="370" y="115" width="230" height="75" rx="8" fill="rgba(255,255,255,0.03)" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="485" y="145" text-anchor="middle" class="label-dim">body</text>
  <text x="485" y="165" text-anchor="middle" class="label-dim">loaded on demand</text>
  <text x="485" y="180" text-anchor="middle" style="font-family:system-ui,sans-serif;font-size:10px;fill:rgba(254,253,249,0.25);">only when agent invokes skill</text>
</svg>
